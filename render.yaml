services:
  - type: web
    name: sf-notes-migration
    runtime: node
    buildCommand: npm install --production=false && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: NPM_CONFIG_PRODUCTION
        value: false
